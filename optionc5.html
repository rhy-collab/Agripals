<!doctype html>
<html lang="en">
<head>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&amp;display=swap" rel="stylesheet">
<style>
  :root{
    --g900:#0e2a20; --g700:#2E8564; --g500:#4CC499; --hair:rgba(255,255,255,.22);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{margin:0; color:#fff; font-family:-apple-system,"SF Pro Text",BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased; line-height:1.5}
  a{color:inherit; text-decoration:none}
  .serif{font-family:"Playfair Display",Georgia,serif}

  /* full-bleed darkened oyster-farm photo */
  .stage{position:relative; min-height:100svh; display:flex; flex-direction:column;
    background:
      linear-gradient(180deg, rgba(6,20,15,.30) 0%, rgba(6,20,15,.55) 45%, rgba(6,20,15,.86) 100%),
      url('./_dsc7679.jpg') center/cover no-repeat;}

  .switch{position:relative; z-index:3; text-align:center; padding:9px 10px; font-size:12px; color:rgba(255,255,255,.7)}
  .switch a{color:#fff; margin:0 5px; font-weight:600} .switch a.off{color:rgba(255,255,255,.55); font-weight:500}

  .top{position:relative; z-index:3; display:flex; align-items:center; gap:10px; padding:6px 22px 0}
  .a-mark{width:32px;height:32px;border-radius:9px;display:inline-flex;align-items:center;justify-content:center;

    box-shadow:0 4px 14px rgba(0,0,0,.35)}
  .top b{font-weight:800; font-size:18px; letter-spacing:.01em}

  .center{position:relative; z-index:3; flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center;
    text-align:center; padding:24px 22px 40px; width:100%; max-width:520px; margin:0 auto}

  .live{display:inline-flex; align-items:center; gap:8px; font-size:12px; font-weight:800; letter-spacing:.1em; text-transform:uppercase;
    padding:7px 14px; border-radius:999px; background:rgba(255,255,255,.14); color:#fff;
    box-shadow:inset 0 0 0 1px var(--hair); -webkit-backdrop-filter:blur(6px); backdrop-filter:blur(6px)}
  .dot{width:8px;height:8px;border-radius:50%;background:#ff5a4d;box-shadow:0 0 0 0 rgba(255,90,77,.6);animation:pulse 1.7s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,90,77,.6)}70%{box-shadow:0 0 0 9px rgba(255,90,77,0)}100%{box-shadow:0 0 0 0 rgba(255,90,77,0)}}

  .from{margin-top:20px; font-size:12.5px; font-weight:800; letter-spacing:.14em; text-transform:uppercase; color:rgba(255,255,255,.72)}
  .name{margin:7px 0 0; font-size:clamp(27px,7.5vw,40px); font-weight:800; line-height:1.02; text-shadow:0 2px 20px rgba(0,0,0,.35)}
  .price{font-family:"Playfair Display",serif; font-weight:800; font-size:clamp(72px,22vw,120px); line-height:.92; margin:10px 0 0;
    text-shadow:0 6px 30px rgba(0,0,0,.4)}
  .price span{font-family:-apple-system,sans-serif; font-size:18px; font-weight:600; color:rgba(255,255,255,.82)}
  .specs{margin:14px 0 0; font-size:13.5px; font-weight:600; color:rgba(255,255,255,.82)}
  .specs i{font-style:normal; opacity:.5; margin:0 8px}

  form{margin-top:26px; width:100%; display:flex; flex-direction:column; gap:10px}
  input{width:100%; padding:17px 18px; border:none; border-radius:16px; background:rgba(255,255,255,.96); color:#12201a;
    font-family:inherit; font-size:16px; box-shadow:0 12px 30px rgba(0,0,0,.28)}
  input::placeholder{color:#8a978d}
  input:focus{outline:none; box-shadow:0 0 0 3px rgba(76,196,153,.65), 0 12px 30px rgba(0,0,0,.28)}
  .btn{width:100%; min-height:56px; font-size:17px; font-weight:800; border:none; cursor:pointer; font-family:inherit; border-radius:16px; color:#fff;
    background:linear-gradient(180deg,var(--g500),var(--g700));
    box-shadow:0 12px 30px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.35); transition:transform .12s}
  .btn:active{transform:scale(.98)}
  .note{margin:13px 2px 0; font-size:13px; color:rgba(255,255,255,.78)}
  .note a{color:#fff; font-weight:700; border-bottom:1px solid rgba(255,255,255,.5)}
</style>
</head>
<body>
<div class="stage">

  <div class="switch">
    <a class="off" href="./index.html">A</a> ·
    <a class="off" href="./optionb.html">B</a> ·
    <a class="off" href="./optionb5.html">B.5</a> ·
    <a class="off" href="./optionc.html">C</a> ·

  <div class="top"><span class="a-mark">A</span><b>Agripals</b></div>

  <main class="center">
    <span class="live"><span class="dot"></span> Today&rsquo;s deal · San Francisco</span>

    <div class="from">British Columbia · Pacific strain</div>
    <div class="name">Royal Miyagi Oysters</div>
    <div class="price serif">$0.70 <span>apiece</span></div>
    <div class="specs">Min. 10 dozen <i>·</i> delivered unshucked <i>·</i> 7 days a week</div>

    <form onsubmit="return claim(event)">
      <input id="ph" type="tel" inputmode="tel" autocomplete="tel" placeholder="Your mobile number" required>
      <button class="btn" type="submit">Text me the deal →</button>
    </form>
    <p class="note" id="note">Free sample? Text <a href="sms:0485945947734?&amp;body=SAMPLE">SAMPLE to 0485 945 947 734</a></p>
  </main>
</div>

<script>
  function claim(e){
    e.preventDefault();
    var num=document.getElementById('ph').value.trim();
    if(!num){ document.getElementById('ph').focus(); return false; }
    var n=document.getElementById('note'); n.innerHTML="✓ You&rsquo;re in — we&rsquo;ll text you today&rsquo;s deal shortly."; n.style.color="#bff3dd";
    window.location.href="mailto:rhys.coombes@gmail.com?subject="+encodeURIComponent("Text me today's deal — Royal Miyagi oysters")+"&body="+encodeURIComponent("Mobile: "+num+"\nInterested in: Royal Miyagi oysters ($0.70 apiece, min 10 dozen)");
    return false;
  }
</script>
