<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Agripals — Today's deal: Royal Miyagi oysters, $0.75 apiece</title>
<meta name="description" content="Royal Miyagi oysters, $0.75 apiece. Text your mobile for today's deal.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&amp;display=swap" rel="stylesheet">
<link rel="preload" as="image" href="./hero-oyster.jpg" fetchpriority="high">
<style>
  :root{
    --g900:#0e2a20; --g700:#2E8564; --g500:#4CC499; --hair:rgba(255,255,255,.22);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{margin:0; color:#fff; font-family:-apple-system,"SF Pro Text",BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased; line-height:1.5}
  a{color:inherit; text-decoration:none}
  .serif{font-family:"Playfair Display",Georgia,serif}

  /* full-bleed darkened oyster-farm photo */
  .stage{position:relative; min-height:100svh; display:flex; flex-direction:column; background-color:#0b241b;
    background-image:
      linear-gradient(180deg, rgba(5,18,13,.50) 0%, rgba(5,18,13,.70) 42%, rgba(5,18,13,.93) 100%),
      url('./hero-oyster.jpg');
    background-size:cover; background-position:center; background-repeat:no-repeat;}

  .switch{position:relative; z-index:3; text-align:center; padding:9px 10px; font-size:12px; color:rgba(255,255,255,.7)}
  .switch a{color:#fff; margin:0 5px; font-weight:600} .switch a.off{color:rgba(255,255,255,.55); font-weight:500}

  .top{position:relative; z-index:3; display:flex; align-items:center; gap:10px; padding:6px 22px 0}
  .a-mark{width:32px;height:32px;border-radius:9px;display:inline-flex;align-items:center;justify-content:center;
    background:linear-gradient(155deg,var(--g500),var(--g700)); color:#fff; font-weight:800; font-size:19px;
    box-shadow:0 4px 14px rgba(0,0,0,.35)}
  .top b{font-weight:800; font-size:18px; letter-spacing:.01em}

  .center{position:relative; z-index:3; flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center;
    text-align:center; padding:18px 22px 28px; width:100%; max-width:520px; margin:0 auto}

  .pitch{margin:0; font-size:clamp(31px,7.8vw,46px); font-weight:800; line-height:1.12; letter-spacing:-.015em;
    max-width:13.5em; text-shadow:0 3px 26px rgba(0,0,0,.55)}
  .pitch b{font-weight:800; white-space:nowrap}
  .pitch .price{font-family:"Playfair Display",serif; font-weight:800; font-size:1.14em; white-space:nowrap; color:#8ff0c8}
  .pitch .sample-copy{display:block; margin-top:14px; font-size:.74em; line-height:1.18}
  .pitch .sample-copy a{color:#8ff0c8; white-space:nowrap}

  form{margin-top:24px; width:100%; display:flex; flex-direction:column; gap:10px}
  input{width:100%; padding:17px 18px; border:none; border-radius:16px; background:rgba(255,255,255,.96); color:#12201a;
    font-family:inherit; font-size:16px; box-shadow:0 12px 30px rgba(0,0,0,.28)}
  input::placeholder{color:#8a978d}
  input:focus{outline:none; box-shadow:0 0 0 3px rgba(76,196,153,.65), 0 12px 30px rgba(0,0,0,.28)}
  .btn{width:100%; min-height:56px; font-size:17px; font-weight:800; border:none; cursor:pointer; font-family:inherit; border-radius:16px; color:#fff;
    background:linear-gradient(180deg,var(--g500),var(--g700));
    box-shadow:0 12px 30px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.35); transition:transform .12s}
  .btn:active{transform:scale(.98)}
  @media (max-width:480px){
    .switch{font-size:11px; padding-top:8px}
    .top{padding:4px 18px 0}
    .center{justify-content:flex-start; padding-top:54px}
    .pitch{font-size:clamp(29px,9.2vw,39px); max-width:10.8em}
    .pitch .sample-copy{font-size:.66em; margin-top:12px}
    form{margin-top:22px}
    input,.btn{border-radius:15px}
  }
</style>
</head>
<body>
<div class="stage">

  <div class="switch">
    <a class="off" href="./optiona.html">A</a> ·
    <a class="off" href="./optionb.html">B</a> ·
    <a class="off" href="./optionb5.html">B.5</a> ·
    <a class="off" href="./optionc.html">C</a> ·
    <a href="./optionc5.html">C.5 · Deal-first</a>
  </div>

  <div class="top"><span class="a-mark">A</span><b>Agripals</b></div>

  <main class="center">
    <p class="pitch">Fresh Royal Miyagi oysters — <span class="price">75¢ each</span>, delivered unshucked seven days a week.<span class="sample-copy">Text <b>SAMPLE</b> to <a href="sms:+14152166182?&amp;body=SAMPLE">+1 415 216 6182</a>, or add your mobile below for a quick callback to organise your order.</span></p>

    <form onsubmit="return claim(event)">
      <input id="ph" type="tel" inputmode="tel" autocomplete="tel" placeholder="Add your mobile — first sample free" required>
      <button class="btn" type="submit">Text me the deal →</button>
    </form>
  </main>
</div>

<script>
  function claim(e){
    e.preventDefault();
    var num=document.getElementById('ph').value.trim();
    if(!num){ document.getElementById('ph').focus(); return false; }
    var btn=document.querySelector('.btn'); if(btn){ btn.textContent="Opening message..."; }
    window.location.href="mailto:rhys.coombes@gmail.com?subject="+encodeURIComponent("Text me today's deal — Royal Miyagi oysters")+"&body="+encodeURIComponent("Mobile: "+num+"\nInterested in: Royal Miyagi oysters ($0.75 apiece, min 10 dozen)");
    return false;
  }
</script>
</body>
</html>
