<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Agripals — Fresher. Cheaper. No middleman.</title>
<meta name="description" content="Agripals — wholesale food, farm-direct. Text our sales team for today's wholesale deals.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  :root{--green:#078539;--ink:#0b1326;--muted:#64748b;--line:#dfe5ef}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;min-height:100%;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--ink);background:#1f1f1f}
  body{display:flex;justify-content:center}
  button,input{font:inherit}
  .phone{position:relative;width:100%;max-width:560px;min-height:100svh;background:#fff;overflow:hidden;border-radius:24px;display:flex;flex-direction:column;box-shadow:0 0 0 1px rgba(15,23,42,.06)}
  .hero{position:relative;flex:1;min-height:0;display:flex;flex-direction:column;padding:42px 40px 54px;overflow:hidden}
  .bg-icon{position:absolute;pointer-events:none;color:#f3f6fa;z-index:0}
  .bg-beef{width:340px;height:340px;right:-188px;top:140px;transform:rotate(-12deg)}
  .bg-fish{width:120px;height:120px;right:202px;top:218px;transform:rotate(15deg)}
  .bg-apple{width:118px;height:118px;right:205px;bottom:-32px;transform:rotate(-15deg)}
  header{position:relative;z-index:1;display:flex;align-items:center;justify-content:space-between;gap:20px}
  .brand{display:flex;align-items:center;gap:11px;color:var(--green);font-weight:800;font-size:34px;line-height:1;letter-spacing:-.04em}
  .brand i{width:43px;height:43px;stroke-width:2.3}
  .access{appearance:none;border:0;background:transparent;color:#65738d;font-weight:800;font-size:21px;line-height:1;white-space:nowrap;padding:0;cursor:pointer}
  main{position:relative;z-index:1;margin-top:auto}
  .deal{margin-bottom:22px}
  .price{font-size:102px;line-height:.84;font-weight:800;letter-spacing:-.075em;color:var(--ink);margin:0 0 15px}
  .product{font-size:35px;line-height:1.08;font-weight:800;letter-spacing:-.045em;color:#1d2a3f;margin:0}
  .unit{font-weight:500;color:#64738b;margin-left:8px;white-space:nowrap}
  .dots{display:flex;align-items:center;gap:12px;margin:28px 0 26px}
  .dot{display:block;width:12px;height:9px;border-radius:99px;background:#dce4ef}
  .dot.active{width:48px;background:var(--green)}
  .claim{font-size:38px;line-height:1.2;letter-spacing:-.055em;font-weight:600;color:#334155;margin:0;max-width:440px}
  .claim strong{font-weight:800;color:var(--green);text-decoration:underline;text-decoration-color:#83efa8;text-decoration-thickness:3px;text-underline-offset:6px}
  .cta{position:relative;z-index:2;background:#fff;border-top:1px solid var(--line);padding:48px 40px 36px;flex:0 0 auto}
  form{display:flex;flex-direction:column;gap:25px;margin:0}
  input{width:100%;border:0;border-bottom:3px solid var(--line);border-radius:0;background:transparent;color:var(--ink);font-size:27px;line-height:1.2;font-weight:700;padding:3px 0 16px;outline:none}
  input::placeholder{color:#8da0bd;opacity:1}
  input:focus{border-color:var(--ink)}
  .submit{width:100%;border:0;border-radius:0;background:#0b1326;color:#fff;font-size:26px;line-height:1;font-weight:800;letter-spacing:.02em;padding:24px 20px;min-height:72px;cursor:pointer;box-shadow:0 3px 8px rgba(15,23,42,.14)}
  .submit:active{transform:scale(.99)}
  #cta-note{margin:27px 0 0;color:#64738b;font-size:20px;line-height:1.35;font-weight:800}
  @media (max-width:480px){
    .phone{max-width:none;border-radius:0;min-height:100svh}
    .hero{padding:32px 28px 40px}
    .brand{font-size:29px}.brand i{width:36px;height:36px}.access{font-size:18px}
    .bg-beef{width:290px;height:290px;right:-165px;top:130px}.bg-fish{width:100px;height:100px;right:118px;top:210px}.bg-apple{width:98px;height:98px;right:132px;bottom:-28px}
    .price{font-size:80px;margin-bottom:12px}.product{font-size:28px}.dots{margin:24px 0 22px}.dot.active{width:42px}
    .claim{font-size:31px;max-width:330px}.claim strong{text-decoration-thickness:2px;text-underline-offset:5px}
    .cta{padding:38px 28px 30px}input{font-size:23px;padding-bottom:14px}.submit{font-size:22px;min-height:64px;padding:20px}#cta-note{font-size:17px;margin-top:24px}
  }
  @media (max-width:370px){
    .hero{padding:28px 24px 34px}.brand{font-size:26px}.brand i{width:32px;height:32px}.access{font-size:16px}
    .price{font-size:72px}.product{font-size:25px}.claim{font-size:28px}.cta{padding:32px 24px 28px}input{font-size:21px}.submit{font-size:20px}
  }
</style>
</head>
<body>
<div class="phone">
  <section class="hero" aria-label="Agripals wholesale deal">
    <i data-lucide="beef" stroke-width="1" class="bg-icon bg-beef" aria-hidden="true"></i>
    <i data-lucide="fish" stroke-width="1.2" class="bg-icon bg-fish" aria-hidden="true"></i>
    <i data-lucide="apple" stroke-width="1.5" class="bg-icon bg-apple" aria-hidden="true"></i>
    <header>
      <div class="brand"><i data-lucide="leaf" aria-hidden="true"></i><span>Agripals</span></div>
      <button class="access" type="button">Wholesaler</button>
    </header>
    <main>
      <div class="deal" aria-label="Today's wholesale deal">
        <p class="price">$3.30</p>
        <p class="product">PEI Mussels.<span class="unit">per lb.</span></p>
      </div>
      <div class="dots" aria-hidden="true"><span class="dot"></span><span class="dot active"></span><span class="dot"></span></div>
      <h1 class="claim"><strong>Fresher.</strong> <strong>Cheaper.</strong> No Middleman.</h1>
    </main>
  </section>
  <section class="cta" aria-label="Text Agripals">
    <form id="cta-form">
      <input id="mobile" type="tel" inputmode="tel" autocomplete="tel" placeholder="e.g. 555-123-4567" required>
      <button class="submit" type="submit">TEXT US</button>
    </form>
    <p id="cta-note">Text our sales team for today's wholesale deals.</p>
  </section>
</div>
<script>
  if(window.lucide) lucide.createIcons();
  document.getElementById('cta-form').addEventListener('submit', function(e){
    e.preventDefault();
    var input = document.getElementById('mobile');
    var num = input.value.trim();
    if(!num){ input.focus(); return; }
    var note = document.getElementById('cta-note');
    note.textContent = "Thanks! We'll text today's deals to " + num + " shortly.";
    note.style.color = '#078539';
    input.value = '';
  });
</script>
</body>
</html>
