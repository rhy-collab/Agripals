<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Agripals — Restaurant Automation</title>
<meta name="description" content="Text us a photo of any invoice. Agripals handles the paperwork, the price moves and the traceability.">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A//www.w3.org/2000/svg%27%20viewBox%3D%270%200%2024%2024%27%20fill%3D%27none%27%20stroke%3D%27%23078539%27%20stroke-width%3D%272%27%20stroke-linecap%3D%27round%27%20stroke-linejoin%3D%27round%27%3E%3Cpath%20d%3D%27M11%2020A7%207%200%200%201%209.8%206.1C15.5%205%2017%204.48%2019%202c1%202%202%204.18%202%208%200%205.5-4.78%2010-10%2010Z%27/%3E%3Cpath%20d%3D%27M2%2021c0-3%201.85-5.36%205.08-6C9.5%2014.52%2012%2013%2013%2012%27/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  :root{--green:#078539;--ink:#0b1326;--muted:#64738b;--line:#dfe5ef}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;min-height:100%;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--ink);background:#fff;-webkit-font-smoothing:antialiased}
  button,input{font:inherit}

  .page{position:relative;min-height:100svh;display:flex;flex-direction:column;overflow:hidden}
  .wrap{width:100%;max-width:1280px;margin:0 auto;padding:0 clamp(24px,5vw,80px)}

  /* faint watermark line icons, like the homepage */
  .bg-icon{position:absolute;pointer-events:none;color:#f4f7fa;z-index:0}
  .bg-fish{width:300px;height:300px;right:6%;top:26%;transform:rotate(10deg)}
  .bg-apple{width:210px;height:210px;right:22%;bottom:16%;transform:rotate(-12deg)}

  header{position:relative;z-index:1;flex:0 0 auto}
  .bar{display:flex;align-items:center;justify-content:space-between;gap:20px;padding:34px 0 0}
  .brand{display:flex;align-items:center;gap:12px;color:var(--green);font-weight:800;font-size:clamp(27px,3.2vw,36px);line-height:1;letter-spacing:-.04em}
  .brand i{width:1.15em;height:1.15em;stroke-width:2.3}
  .role{color:#65738d;font-weight:800;font-size:clamp(15px,1.5vw,20px);line-height:1;white-space:nowrap}

  main{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;justify-content:center;padding:40px 0}
  .stat{font-size:clamp(72px,12vw,132px);line-height:.84;font-weight:800;letter-spacing:-.075em;color:var(--ink);margin:0 0 18px}
  .thing{font-size:clamp(26px,3.6vw,40px);line-height:1.08;font-weight:800;letter-spacing:-.045em;color:#1d2a3f;margin:0}
  .thing span{font-weight:500;color:var(--muted);margin-left:10px;white-space:nowrap}
  .dots{display:flex;align-items:center;gap:12px;margin:26px 0 34px}
  .dot{display:block;width:12px;height:9px;border-radius:99px;background:#dce4ef;transition:width .3s}
  .dot.active{width:48px;background:var(--green)}
  .claim{font-size:clamp(29px,4.4vw,48px);line-height:1.16;letter-spacing:-.055em;font-weight:600;color:#334155;margin:0;max-width:15em}
  .claim strong{font-weight:800;color:var(--green);text-decoration:underline;text-decoration-color:#83efa8;text-decoration-thickness:3px;text-underline-offset:6px}

  .cta{position:relative;z-index:1;flex:0 0 auto;border-top:1px solid var(--line);padding:38px 0 44px}
  form{display:flex;align-items:flex-end;gap:22px;margin:0}
  input{flex:1;min-width:0;border:0;border-bottom:3px solid var(--line);border-radius:0;background:transparent;color:var(--ink);
    font-size:clamp(21px,2.2vw,28px);line-height:1.2;font-weight:700;padding:3px 0 14px;outline:none}
  input::placeholder{color:#8da0bd;opacity:1}
  input:focus{border-color:var(--ink)}
  .submit{flex:0 0 auto;border:0;border-radius:0;background:var(--ink);color:#fff;font-size:clamp(18px,1.7vw,24px);line-height:1;
    font-weight:800;letter-spacing:.02em;padding:26px 44px;cursor:pointer;box-shadow:0 3px 8px rgba(15,23,42,.14)}
  .submit:hover{background:#000}
  .submit:active{transform:scale(.99)}
  #note{margin:24px 0 0;color:var(--muted);font-size:clamp(15px,1.4vw,19px);line-height:1.4;font-weight:700}

  @media (max-width:720px){
    .bar{padding-top:26px}
    main{padding:28px 0}
    .dots{margin:22px 0 26px}
    .cta{padding:30px 0 34px}
    form{flex-direction:column;align-items:stretch;gap:20px}
    .submit{width:100%;padding:22px 20px;min-height:66px}
    .bg-fish{width:200px;height:200px;right:-30px;top:22%}
    .bg-apple{width:150px;height:150px;right:8%;bottom:20%}
    #note{margin-top:20px}
  }
</style>
</head>
<body>
<div class="page">
  <i data-lucide="fish" stroke-width="1.1" class="bg-icon bg-fish" aria-hidden="true"></i>
  <i data-lucide="apple" stroke-width="1.3" class="bg-icon bg-apple" aria-hidden="true"></i>

  <header>
    <div class="wrap bar">
      <div class="brand"><i data-lucide="leaf" aria-hidden="true"></i><span>Agripals</span></div>
      <span class="role">Restaurant Automation</span>
    </div>
  </header>

  <main class="wrap">
    <p class="stat" id="stat">5%</p>
    <p class="thing" id="thing">Saved on supply.<span id="unit">last month</span></p>
    <div class="dots" id="dots" aria-hidden="true"></div>
    <h1 class="claim">Automate your <strong>operations.</strong></h1>
  </main>

  <section class="cta">
    <div class="wrap">
      <form id="cta-form">
        <input id="mobile" type="tel" inputmode="tel" autocomplete="tel" placeholder="e.g. 0412 345 678" required>
        <button class="submit" type="submit">TEXT US</button>
      </form>
      <p id="note">Text us a photo of any invoice — we'll do the rest.</p>
    </div>
  </section>
</div>

<script>
  if(window.lucide) lucide.createIcons();

  var ITEMS = [
    { stat:'5%',   thing:'Saved on supply.',   unit:'last month' },
    { stat:'↑8%',  thing:'Salmon flagged.',    unit:'before the invoice' },
    { stat:'12',   thing:'Invoice lines read.',unit:'from one photo' },
    { stat:'100%', thing:'Traceable.',         unit:'farm to plate' }
  ];
  var sEl=document.getElementById('stat'), tEl=document.getElementById('thing'),
      uEl=document.getElementById('unit'), dots=document.getElementById('dots'), i=0;
  ITEMS.forEach(function(){ var d=document.createElement('span'); d.className='dot'; dots.appendChild(d); });
  function render(){
    var m=ITEMS[i];
    sEl.textContent=m.stat;
    tEl.firstChild.nodeValue=m.thing;
    uEl.textContent=m.unit;
    Array.prototype.forEach.call(dots.children,function(d,n){ d.className='dot'+(n===i?' active':''); });
  }
  render();
  if(!window.matchMedia('(prefers-reduced-motion: reduce)').matches){
    setInterval(function(){ i=(i+1)%ITEMS.length; render(); }, 3500);
  }

  document.getElementById('cta-form').addEventListener('submit', function(e){
    e.preventDefault();
    var input=document.getElementById('mobile');
    var num=input.value.trim();
    if(!num){ input.focus(); return; }
    var note=document.getElementById('note');
    note.textContent="Thanks! We'll text you from Agripals shortly.";
    note.style.color='#078539';
    input.value='';
  });
</script>
</body>
</html>
