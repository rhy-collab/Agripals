<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Providores — Today's deal: Royal Miyagi oysters, $0.70 apiece</title>
<meta name="description" content="Providores — San Francisco. Royal Miyagi oysters, $0.70 apiece. Text your mobile for today's deal.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&amp;display=swap" rel="stylesheet">
<link rel="preload" as="image" href="./hero-oyster.jpg" fetchpriority="high">
<style>
  :root{ --ink:#1b1a17; --hair:rgba(255,255,255,.22); }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{margin:0; color:#fff; font-family:-apple-system,"SF Pro Text",BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased; line-height:1.5}
  a{color:inherit; text-decoration:none}
  .serif{font-family:"Playfair Display",Georgia,serif}

  /* full-bleed darkened oyster-farm photo */
  .stage{position:relative; min-height:100svh; display:flex; flex-direction:column; background-color:#141310;
    background-image:
      linear-gradient(180deg, rgba(12,12,10,.48) 0%, rgba(12,12,10,.68) 42%, rgba(12,12,10,.93) 100%),
      url('./hero-oyster.jpg');
    background-size:cover; background-position:center; background-repeat:no-repeat;}

  .switch{position:relative; z-index:3; text-align:center; padding:9px 10px; font-size:12px; color:rgba(255,255,255,.7)}
  .switch a{color:#fff; margin:0 5px; font-weight:600} .switch a.off{color:rgba(255,255,255,.55); font-weight:500}

  .top{position:relative; z-index:3; display:flex; align-items:baseline; gap:10px; padding:6px 22px 0}
  .brand{font-size:22px; font-weight:800; letter-spacing:.01em}
  .brand small{font-family:-apple-system,sans-serif; font-size:9px; font-weight:700; letter-spacing:.26em; text-transform:uppercase; color:rgba(255,255,255,.7); margin-left:2px}

  .center{position:relative; z-index:3; flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center;
    text-align:center; padding:24px 22px 40px; width:100%; max-width:520px; margin:0 auto}

  .live{display:inline-flex; align-items:center; gap:8px; font-size:12px; font-weight:800; letter-spacing:.1em; text-transform:uppercase;
    padding:7px 14px; border-radius:999px; background:rgba(255,255,255,.14); color:#fff;
    box-shadow:inset 0 0 0 1px var(--hair); -webkit-backdrop-filter:blur(6px); backdrop-filter:blur(6px)}
  .dot{width:8px;height:8px;border-radius:50%;background:#ff5a4d;box-shadow:0 0 0 0 rgba(255,90,77,.6);animation:pulse 1.7s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,90,77,.6)}70%{box-shadow:0 0 0 9px rgba(255,90,77,0)}100%{box-shadow:0 0 0 0 rgba(255,90,77,0)}}

  .pitch{margin:22px 0 0; font-size:clamp(30px,7.6vw,46px); font-weight:800; line-height:1.16; letter-spacing:-.015em;
    max-width:13.5em; text-shadow:0 3px 26px rgba(0,0,0,.55)}
  .pitch b{font-weight:800; white-space:nowrap}
  .pitch .price{font-family:"Playfair Display",serif; font-weight:800; font-size:1.14em; white-space:nowrap; color:#fff}

  form{margin-top:30px; width:100%; display:flex; flex-direction:column; gap:10px}
  input{width:100%; padding:17px 18px; border:none; border-radius:16px; background:rgba(255,255,255,.96); color:var(--ink);
    font-family:inherit; font-size:16px; box-shadow:0 12px 30px rgba(0,0,0,.28)}
  input::placeholder{color:#9a968b}
  input:focus{outline:none; box-shadow:0 0 0 3px rgba(255,255,255,.65), 0 12px 30px rgba(0,0,0,.28)}
  .btn{width:100%; min-height:56px; font-size:17px; font-weight:800; border:none; cursor:pointer; font-family:inherit; border-radius:16px; color:#fff;
    background:linear-gradient(180deg,#3a3833,#1b1a17);
    box-shadow:0 12px 30px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.22); transition:transform .12s}
  .btn:active{transform:scale(.98)}
  .note{margin:13px 2px 0; font-size:13px; color:rgba(255,255,255,.78)}
  .note a{color:#fff; font-weight:700; border-bottom:1px solid rgba(255,255,255,.5)}
</style>
</head>
<body>
<div class="stage">

  <div class="switch">
    <a class="off" href="./optiona.html">A</a> ·
    <a class="off" href="./optionb.html">B</a> ·
    <a href="./optionb5.html">B.5 · Providores</a> ·
    <a class="off" href="./optionc.html">C</a> ·
    <a class="off" href="./optionc5.html">C.5</a> ·
    <a class="off" href="./optiond.html">D · Final</a>
  </div>

  <div class="top"><span class="brand serif">Providores<small>San Francisco</small></span></div>

  <main class="center">
    <span class="live"><span class="dot"></span> Today&rsquo;s deal · San Francisco</span>

    <p class="pitch">Fresh Royal Miyagi oysters — <span class="price">70¢ each</span>, delivered unshucked seven days a week, plus a <b>free sample</b> when you text.</p>

    <form onsubmit="return claim(event)">
      <input id="ph" type="tel" inputmode="tel" autocomplete="tel" placeholder="Your mobile number" required>
      <button class="btn" type="submit">Text me the deal →</button>
    </form>
    <p class="note" id="note">We&rsquo;ll text you today&rsquo;s deal &amp; your free sample.</p>
  </main>
</div>

<script>
  function claim(e){
    e.preventDefault();
    var num=document.getElementById('ph').value.trim();
    if(!num){ document.getElementById('ph').focus(); return false; }
    var n=document.getElementById('note'); n.innerHTML="✓ You&rsquo;re in — we&rsquo;ll text you today&rsquo;s deal shortly."; n.style.color="#eae7dd";
    window.location.href="mailto:rhys.coombes@gmail.com?subject="+encodeURIComponent("Text me today's deal — Royal Miyagi oysters")+"&body="+encodeURIComponent("Mobile: "+num+"\nInterested in: Royal Miyagi oysters ($0.70 apiece, min 10 dozen)");
    return false;
  }
</script>
</body>
</html>
