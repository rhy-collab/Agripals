<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Agripals</title>
<style>
  :root{--g5:#4CC499;--g7:#2E8564;--g9:#123024}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(120% 120% at 50% 0%,#eaf5ee 0%,#dcefe1 55%,#cfe9d8 100%);color:#12201a;padding:24px}
  .card{max-width:460px;text-align:center;background:rgba(255,255,255,.72);backdrop-filter:blur(14px);
    border:1px solid rgba(18,32,26,.09);border-radius:26px;padding:40px 30px;box-shadow:0 20px 50px rgba(18,48,36,.14)}
  .logo{width:88px;height:88px;border-radius:26px;margin:0 auto 18px;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(155deg,var(--g5),var(--g7));color:#fff;font-size:44px;box-shadow:0 10px 24px rgba(24,51,45,.25)}
  h1{margin:0 0 6px;font-size:30px;letter-spacing:-.02em}
  p{margin:0 auto 24px;max-width:360px;color:#3a4a42;line-height:1.5}
  a.btn{display:inline-block;text-decoration:none;font-weight:800;font-size:16px;padding:15px 30px;border-radius:16px;
    background:linear-gradient(180deg,var(--g5),var(--g7));color:#fff;box-shadow:0 8px 20px rgba(46,133,100,.35);transition:transform .15s}
  a.btn:active{transform:scale(.96)}
  .sub{margin-top:18px;font-size:13px}
  .sub a{color:var(--g7);font-weight:700}
</style>
</head>
<body>
  <div class="card">
    <div class="logo">🌱</div>
    <h1>Agripals</h1>
    <p>Fresher, cheaper produce straight from the farm — with Herbie, Eddie and Janice, your ordering, money and marketing pals.</p>
    <a class="btn" href="./App-Prototype/">Open the interactive prototype →</a>
    <div class="sub">Chef app demo · works best on a phone-sized window</div>
  </div>
</body>
</html>
